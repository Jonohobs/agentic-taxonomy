// ── Build 3D ───────────────────────────────────────────────────────────
const nodeGroup = new THREE.Group();
const meshMap = {};      // id → mesh (for raycasting)
const groupMap = {};     // id → group (for position animation)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function createGeometry(shape, size) {
  switch (shape) {
    case 'ico': return new THREE.IcosahedronGeometry(size, 1);
    case 'octa': return new THREE.OctahedronGeometry(size, 0);
    case 'dodeca': return new THREE.DodecahedronGeometry(size, 0);
    case 'box': return new THREE.BoxGeometry(size * 1.4, size * 1.4, size * 1.4);
    case 'sphere': return new THREE.SphereGeometry(size, 16, 16);
    case 'ring': return new THREE.TorusGeometry(size * 1.2, size * 0.25, 12, 32);
    default: return new THREE.IcosahedronGeometry(size, 1);
  }
}

nodes.forEach(n => {
  // Each node gets its own group — everything moves together
  const group = new THREE.Group();
  group.position.set(...n.pos);
  group.frustumCulled = false;

  const geo = createGeometry(n.shape, n.size);
  const mat = new THREE.MeshPhysicalMaterial({
    color: n.color,
    emissive: n.color,
    emissiveIntensity: 0.15,
    metalness: 0.3,
    roughness: 0.4,
    transparent: true,
    opacity: 0.85,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = n;
  mesh.frustumCulled = false;
  mesh.renderOrder = 1;
  group.add(mesh);
  // For ring shapes, add invisible sphere hitbox for easier raycasting
  if (n.shape === 'ring') {
    const hitGeo = new THREE.SphereGeometry(n.size * 2.5, 8, 8);
    const hitMat = new THREE.MeshBasicMaterial({ visible: false });
    const hitMesh = new THREE.Mesh(hitGeo, hitMat);
    hitMesh.userData = n;
    hitMesh.frustumCulled = false;
    group.add(hitMesh);
    meshMap[n.id] = hitMesh;
  } else {
    meshMap[n.id] = mesh;
  }
  groupMap[n.id] = group;

  // Wireframe overlay
  const wireMat = new THREE.MeshBasicMaterial({
    color: n.color, wireframe: true, transparent: true, opacity: 0.15,
    depthWrite: false,
  });
  const wire = new THREE.Mesh(geo.clone(), wireMat);
  wire.scale.setScalar(1.15);
  wire.frustumCulled = false;
  wire.renderOrder = 0;
  group.add(wire);

  // Glow
  const spriteMat = new THREE.SpriteMaterial({
    map: createGlowTexture(n.color),
    transparent: true, opacity: 0.25, depthWrite: false,
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.setScalar(n.size * 4.5);
  sprite.frustumCulled = false;
  sprite.renderOrder = 2;
  group.add(sprite);

  // Label — offset above the node within the group
  const labelSprite = createLabel(n.label, n.color);
  labelSprite.position.set(0, n.size + 0.7, 0);
  labelSprite.scale.set(3.5, 0.9, 1);
  labelSprite.frustumCulled = false;
  labelSprite.renderOrder = 3;
  group.add(labelSprite);

  nodeGroup.add(group);
});

scene.add(nodeGroup);

// ── Build connections ──────────────────────────────────────────────────
const connectionGroup = new THREE.Group();

connections.forEach(c => {
  const fromGroup = groupMap[c.from];
  const toGroup = groupMap[c.to];
  if (!fromGroup || !toGroup) return;

  const from = fromGroup.position.clone();
  const to = toGroup.position.clone();

  // Curved path
  const mid = from.clone().lerp(to, 0.5);
  const offset = new THREE.Vector3(
    (Math.random() - 0.5) * 1.5,
    0,
    (Math.random() - 0.5) * 1.5 + 1.5
  );
  mid.add(offset);

  const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
  const curvePoints = curve.getPoints(30);

  // Line
  const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x3355aa, transparent: true, opacity: 0.2,
    depthWrite: false,
  });
  const line = new THREE.Line(lineGeo, lineMat);
  line.frustumCulled = false;
  connectionGroup.add(line);

  // Bouncing particles — request (blue) and response (orange)
  const dotGeo = new THREE.SphereGeometry(0.06, 6, 6);

  const dot1 = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0x88aaff }));
  dot1.userData = { curve, t: Math.random(), speed: 0.003 + Math.random() * 0.002, direction: 1 };
  dot1.frustumCulled = false;
  connectionGroup.add(dot1);

  const dot2 = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xffaa66 }));
  dot2.userData = { curve, t: Math.random(), speed: 0.0025 + Math.random() * 0.002, direction: -1 };
  dot2.frustumCulled = false;
  connectionGroup.add(dot2);
});

scene.add(connectionGroup);

// ── Context Window boundary — wraps around the agent ───────────────────
// Outer ring
const ctxRingGeo = new THREE.TorusGeometry(6, 0.04, 12, 64);
const ctxRingMat = new THREE.MeshBasicMaterial({
  color: 0xffdd44, transparent: true, opacity: 0.18,
  depthWrite: false,

const ctxRing = new THREE.Mesh(ctxRingGeo, ctxRingMat);
ctxRing.position.set(0, 10, 0);
ctxRing.rotation.x = Math.PI / 2;

// Second ring tilted for sphere-like feel

ctxRing2.rotation.z = Math.PI / 4;

// ── Fireflies ─────────────────────────────────────────────────────────
const fireflyCount = 150;
const fireflyGeo = new THREE.BufferGeometry();
const ffPositions = new Float32Array(fireflyCount * 3);
const ffSeeds = new Float32Array(fireflyCount); // per-particle phase offset
for (let i = 0; i < fireflyCount; i++) {
  ffPositions[i * 3] = (Math.random() - 0.5) * 50;
  ffPositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
  ffPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
  ffSeeds[i] = Math.random() * Math.PI * 2;
}
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(ffPositions, 3));
fireflyGeo.setAttribute('seed', new THREE.BufferAttribute(ffSeeds, 1));

const fireflyMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color(0xffaa33) },  // warm orange
    uColor2: { value: new THREE.Color(0xffdd66) },  // soft yellow
  },
  vertexShader: `
    attribute float seed;
    varying float vBrightness;
    varying float vColorMix;
    uniform float uTime;
    void main() {
      vec3 pos = position;
      // Gentle drift
      pos.x += sin(uTime * 0.15 + seed * 6.28) * 0.8;
      pos.y += cos(uTime * 0.1 + seed * 4.0) * 0.5;
      pos.z += sin(uTime * 0.12 + seed * 5.0) * 0.6;
      // Pulsing brightness per firefly
      vBrightness = 0.3 + 0.7 * pow(sin(uTime * (0.8 + seed * 0.5) + seed * 6.28) * 0.5 + 0.5, 3.0);
      vColorMix = sin(seed * 3.14) * 0.5 + 0.5;
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = (3.0 + vBrightness * 4.0) * (200.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor1;
    uniform vec3 uColor2;
    varying float vBrightness;
    varying float vColorMix;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float glow = exp(-d * d * 3.0);
      vec3 col = mix(uColor1, uColor2, vColorMix);
      gl_FragColor = vec4(col, glow * vBrightness * 0.3);
    }
  `,
});
const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
fireflies.frustumCulled = false;
scene.add(fireflies);

// ── Aurora background ─────────────────────────────────────────────────
const auroraMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  side: THREE.DoubleSide,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      float y = vUv.y;
      // Flowing wave bands
      float wave1 = sin(vUv.x * 3.0 + uTime * 0.2 + y * 2.0) * 0.5 + 0.5;
      float wave2 = sin(vUv.x * 5.0 - uTime * 0.15 + y * 3.0) * 0.5 + 0.5;
      float wave3 = sin(vUv.x * 2.0 + uTime * 0.1 + y * 4.0) * 0.5 + 0.5;
      // Color channels — green/teal/purple aurora
      vec3 col = vec3(0.0);
      col += vec3(0.1, 0.8, 0.4) * wave1 * 0.4;
      col += vec3(0.2, 0.4, 0.9) * wave2 * 0.3;
      col += vec3(0.6, 0.2, 0.8) * wave3 * 0.2;
      // Fade at edges
      float fade = smoothstep(0.0, 0.3, y) * smoothstep(1.0, 0.6, y);
      fade *= smoothstep(0.0, 0.2, vUv.x) * smoothstep(1.0, 0.8, vUv.x);
      gl_FragColor = vec4(col, fade * 0.08);
    }
  `,
});
const auroraGeo = new THREE.PlaneGeometry(80, 40);
const aurora = new THREE.Mesh(auroraGeo, auroraMat);
aurora.position.set(0, 10, -30);
aurora.frustumCulled = false;
aurora.renderOrder = -1;
scene.add(aurora);

const wallGridLeft = new THREE.GridHelper(50, 50, 0x1a1a2e, 0x111122);

// ── Helpers ────────────────────────────────────────────────────────────
function createGlowTexture(color) {
  const s = 128, canvas = document.createElement('canvas');
  canvas.width = canvas.height = s;
  const ctx = canvas.getContext('2d');
  const c = new THREE.Color(color);
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},0.5)`);
  g.addColorStop(0.4, `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},0.1)`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(canvas);
}

function createLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 96;
  const ctx = canvas.getContext('2d');
  const c = new THREE.Color(color);
  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = `rgba(${c.r*255|0},${c.g*255|0},${c.b*255|0},0.9)`;
  ctx.fillText(text, 256, 48);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  return new THREE.Sprite(mat);
}

// ── Tooltip ────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const tooltipTitle = tooltip.querySelector('h3');
const tooltipLayer = tooltip.querySelector('.layer');
const tooltipBody = tooltip.querySelector('p');
let hoveredNodes = [];

function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = nodes.map(n => meshMap[n.id]);
  const hits = raycaster.intersectObjects(meshes, false);

  // Collect all unique hits (deduplicate by node id)
  const seen = new Set();
  const hitNodes = [];
  for (const hit of hits) {
    const data = hit.object.userData;
    if (data.label && !seen.has(data.id)) {
      seen.add(data.id);
      hitNodes.push({ data, obj: hit.object });
    }
  }

  if (hitNodes.length > 0) {
    hoveredNodes = hitNodes.map(h => h.obj);
    if (hitNodes.length === 1) {
      const d = hitNodes[0].data;
      tooltipTitle.textContent = d.label;
      tooltipLayer.textContent = `${d.layer} Layer`;
      tooltipBody.innerHTML = `${d.desc}<br><br><em style="color:#777">e.g. ${d.example}</em>`;
    } else {
      tooltipTitle.textContent = hitNodes.map(h => h.data.label).join(' + ');
      tooltipLayer.textContent = hitNodes.map(h => `${h.data.layer} Layer`).join(' · ');
      tooltipBody.innerHTML = hitNodes.map(h =>
        `<strong style="color:#${h.data.color.toString(16).padStart(6,'0')}">${h.data.label}</strong><br>${h.data.desc}<br><em style="color:#777">e.g. ${h.data.example}</em>`
      ).join('<br><br>');
    }
    tooltip.style.display = 'block';
    document.body.style.cursor = 'pointer';
    return;
  }
  hoveredNodes = [];
  tooltip.style.display = 'none';
  document.body.style.cursor = 'default';
}
window.addEventListener('mousemove', onMouseMove);

// ── Animate ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Node animation — move the group, rotate the mesh
  nodes.forEach(n => {
    const group = groupMap[n.id];
    const mesh = meshMap[n.id];
    const baseY = n.pos[1];
    group.position.y = baseY + Math.sin(t * 0.4 + n.pos[0] * 0.5 + n.pos[2] * 0.3) * 0.25;
    mesh.rotation.y = t * 0.12 + n.pos[0];
    mesh.rotation.x = Math.sin(t * 0.25 + n.pos[2]) * 0.08;

    if (hoveredNodes.includes(mesh)) {
      mesh.material.emissiveIntensity = 0.5 + Math.sin(t * 5) * 0.15;
      mesh.scale.setScalar(1.15);
    } else {
      mesh.material.emissiveIntensity = 0.15;
      mesh.scale.setScalar(1.0);
    }
  });

  // Connection particles bounce
  connectionGroup.children.forEach(child => {
    if (child.userData.curve) {
      child.userData.t += child.userData.speed * child.userData.direction;
      if (child.userData.t >= 1) { child.userData.t = 1; child.userData.direction = -1; }
      else if (child.userData.t <= 0) { child.userData.t = 0; child.userData.direction = 1; }
      child.position.copy(child.userData.curve.getPointAt(child.userData.t));
    }
  });

  // Context rings orbit around agent
  ctxRing.rotation.z = t * 0.08;
  ctxRing.material.opacity = 0.1 + Math.sin(t * 0.6) * 0.06;
  ctxRing2.rotation.z = t * 0.06 + 1;
  ctxRing2.rotation.x = Math.PI / 3 + Math.sin(t * 0.15) * 0.2;
  ctxRing2.material.opacity = 0.1 + Math.sin(t * 0.8 + 1) * 0.06;
  ctxRing3.rotation.y = Math.PI / 3 + t * 0.04;
  ctxRing3.rotation.x = Math.PI / 2.5 + Math.sin(t * 0.2) * 0.15;
  ctxRing3.material.opacity = 0.1 + Math.sin(t * 0.7 + 2) * 0.06;
  ctxSphere.material.opacity = 0.025 + Math.sin(t * 0.4) * 0.015;

  // Fireflies + aurora
  fireflyMat.uniforms.uTime.value = t;
  auroraMat.uniforms.uTime.value = t;

  // Lights
  rimLight.intensity = 0.5 + Math.sin(t * 0.7) * 0.2;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
